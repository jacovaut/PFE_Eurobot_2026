[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_microros_distro = jazzy
board_microros_transport = serial 
upload_port = /dev/ttyUSB0
upload_speed = 115200
monitor_port = /dev/ttyUSB0
upload_protocol = esptool
upload_command = ~/.local/bin/esptool --chip esp32 --port $UPLOAD_PORT --baud $UPLOAD_SPEED write_flash -z 0x10000 $SOURCE
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio.git

[env:test_pub]
build_src_filter = +<${PIOENV}/*>

[env:entrainement]
build_src_filter = +<${PIOENV}/*>
lib_deps = 
    ${env.lib_deps}
    gin66/FastAccelStepper
    https://github.com/pololu/high-power-stepper-driver-arduino
    https://github.com/madhephaestus/ESP32Encoder

[env:driver]
build_src_filter = +<${PIOENV}/*>
lib_deps = 
    ${env.lib_deps}
    gin66/FastAccelStepper
    https://github.com/pololu/high-power-stepper-driver-arduino

[env:deadwheels]
build_src_filter = +<${PIOENV}/*>
lib_deps =
    ${env.lib_deps}
    https://github.com/madhephaestus/ESP32Encoder.git

[env:manipulation]
build_src_filter = +<${PIOENV}/*>

[env:alimentation]
build_src_filter = +<${PIOENV}/*>

[env:encoder_test]
build_src_filter = +<${PIOENV}/*>