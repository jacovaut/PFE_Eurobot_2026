global_localization_node:
  ros__parameters:
    # Shared launch defaults
    use_cluster_pipeline: true

    # Camera and detection settings
    camera_path: "/dev/v4l/by-id/usb-HD_USB_Camera_HD_USB_Camera_01.00.00-video-index0" # Primary (stable) camera selector
    camera_index: 4 # Fallback only if camera_path is empty
    width: 3840
    height: 2160
    fps: 30
    fourcc: "MJPG"
    debug_view: true

    # Frames / topics
    map_frame: "map"
    pose_topic: "/camera/global_pose"
    detected_blocks_topic: "/detected_blocks"

    # Marker setup
    robot_marker_id: 7
    table_marker_length_m: 0.10
    robot_marker_length_m: 0.07
    block_marker_length_m: 0.03
    block_marker_ids: [36, 47]
    block_marker_colors: ["bleu", "jaune"]
    block_size_x_m: 0.15
    block_size_y_m: 0.05
    block_center_z_m: 0.03
    min_table_markers: 1

    # ArUco detector tuning (important for large table markers IDs 20-23)
    detector_perspective_remove_pixel_per_cell: 10
    detector_adaptive_thresh_win_size_min: 3
    detector_adaptive_thresh_win_size_max: 101
    detector_adaptive_thresh_win_size_step: 14
    detector_adaptive_thresh_constant: 7.0
    detector_min_marker_perimeter_rate: 0.005
    detector_max_marker_perimeter_rate: 4.0
    detector_error_correction_rate: 0.45
    detector_use_corner_refinement_subpix: true

    # 2nd pass for hard large table markers (adds missing IDs only)
    enable_table_marker_rescue_pass: true
    rescue_clahe_clip_limit: 3.0
    rescue_adaptive_thresh_win_size_max: 181
    rescue_adaptive_thresh_win_size_step: 30
    rescue_min_marker_perimeter_rate: 0.015
    rescue_error_correction_rate: 0.6

    # Marker -> base_link transform (in marker frame)
    marker_to_base_x: 0.0
    marker_to_base_y: 0.0
    marker_to_base_z: 0.0
    marker_to_base_yaw: 0.0

    # Measurement covariance
    position_variance_x: 0.01
    position_variance_y: 0.01
    yaw_variance: 0.03

    # -----------------------------
    # World map (table marker poses in map frame)
    # -----------------------------
    # Keep arrays aligned by index.
    # Example: marker id table_marker_ids[i] is at
    # (x, y, z, yaw) = (table_marker_x_m[i], table_marker_y_m[i], table_marker_z_m[i], table_marker_yaw_rad[i]).
    table_marker_ids: [20, 21, 22, 23]
    table_marker_x_m: [0.6, 2.4, 0.6, 2.4]
    table_marker_y_m: [1.4, 1.4, 0.6, 0.6]
    table_marker_z_m: [0.0, 0.0, 0.0, 0.0]
    table_marker_yaw_rad: [0.0, 0.0, 0.0, 0.0]

    # -----------------------------
    # Zones de score (fixes, map frame)
    # -----------------------------
    # Nids (zones d'equipe), dimensions: 600 x 450 mm
    nids_noms: ["nid_jaune", "nid_bleu"]
    nids_centre_x_m: [0.300, 2.700]
    nids_centre_y_m: [1.775, 1.775]
    nids_taille_x_m: [0.600, 0.600]
    nids_taille_y_m: [0.450, 0.450]

    # Garde-manger (zones communes), dimensions: 200 x 200 mm
    garde_manger_noms: [
      "garde_manger_1", "garde_manger_2", "garde_manger_3", "garde_manger_4",
      "garde_manger_5", "garde_manger_6", "garde_manger_7", "garde_manger_8"
    ]
    garde_manger_centre_x_m: [0.700, 1.500, 2.300, 2.200, 1.500, 0.800, 1.750, 1.250]
    garde_manger_centre_y_m: [0.100, 0.100, 0.100, 0.800, 0.800, 0.800, 1.450, 1.450]
    garde_manger_taille_x_m: [0.200, 0.200, 0.200, 0.200, 0.200, 0.200, 0.200, 0.200]
    garde_manger_taille_y_m: [0.200, 0.200, 0.200, 0.200, 0.200, 0.200, 0.200, 0.200]

    # Zones interdites pour la navigation, dimensions: 1800 x 450 mm
    zones_interdites_noms: ["grenier"]
    zones_interdites_centre_x_m: [1.500]
    zones_interdites_centre_y_m: [1.775]
    zones_interdites_taille_x_m: [1.800]
    zones_interdites_taille_y_m: [0.450]

