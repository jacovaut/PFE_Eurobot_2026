global_localization_node:
  ros__parameters:
    # Camera and detection settings
    camera_index: 4 ###CHANGES!!!! IF NEEDED
    width: 3840
    height: 2160
    fps: 30
    fourcc: "MJPG"
    debug_view: true

    # Frames / topics
    map_frame: "map"
    pose_topic: "/camera/global_pose"

    # Marker setup
    robot_marker_id: 7
    table_marker_length_m: 0.10
    robot_marker_length_m: 0.07
    min_table_markers: 1

    # Marker -> base_link transform (in marker frame)
    marker_to_base_x: 0.0
    marker_to_base_y: 0.0
    marker_to_base_z: 0.0
    marker_to_base_yaw: 0.0

    # Measurement covariance
    position_variance_x: 0.01
    position_variance_y: 0.01
    yaw_variance: 0.03

    # -----------------------------
    # World map (table marker poses in map frame)
    # -----------------------------
    # Keep arrays aligned by index.
    # Example: marker id table_marker_ids[i] is at
    # (x, y, z, yaw) = (table_marker_x_m[i], table_marker_y_m[i], table_marker_z_m[i], table_marker_yaw_rad[i]).
    table_marker_ids: [20, 21, 22, 23]
    table_marker_x_m: [0.6, 2.4, 0.6, 2.4]
    table_marker_y_m: [1.4, 1.4, 0.6, 0.6]
    table_marker_z_m: [0.0, 0.0, 0.0, 0.0]
    table_marker_yaw_rad: [0.0, 0.0, 0.0, 0.0]
